apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sureacccount-api-alerts
  labels:
    app.kubernetes.io/name: sureacccount-api
    release: prometheus
spec:
  groups:
    - name: sureacccount-api.availability
      rules:
        - alert: sureacccount-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="sureacccount-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="sureacccount-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Platform Engineering
          annotations:
            summary: sureacccount-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: sureacccount-apiUnavailable
          expr: up{job="sureacccount-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Platform Engineering
          annotations:
            summary: sureacccount-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
