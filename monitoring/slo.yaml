apiVersion: sre.platform.ohanyere.io/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: sureacccount-api-availability
  labels:
    app.kubernetes.io/name: sureacccount-api
    finops.ohanyere.io/cost-center: platform-engineering
spec:
  service: sureacccount-api
  owner: Platform Engineering
  objective: 99.9
  window: 30d
  indicator:
    type: availability
    goodEvents: sum(rate(http_requests_total{service="sureacccount-api",status!~"5.."}[5m]))
    totalEvents: sum(rate(http_requests_total{service="sureacccount-api"}[5m]))
  alerting:
    burnRate:
      enabled: true
